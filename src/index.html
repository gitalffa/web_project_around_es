<!doctype html>
<html lang="es-mx">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../favicon.ico" />
    <link rel="stylesheet" href="./page/index.css" />

    <title>Around</title>
  </head>
  <body>
    <div class="page">
      <div class="popup popup_hidden" id="popupImage">
        <div class="popup__contenido">
          <img src="" alt="Imagen Ampliada" class="popup__imagen" />
          <button class="popup__cerrar">✖</button>
          <p class="popup__footer"></p>
        </div>
      </div>
      <div class="popup popup-confirm-delete popup_hidden">
        <div class="popup-confirm-delete__overlay"></div>
        <div class="popup-editor-profile__confirm-delete_base">
          <button type="button" class="popup__close-button popup__cerrar">
            ✖
          </button>
          <div class="popup__container">
            <form class="popup__form" name="confirm-delete">
              <h2 class="popup__title">¿Estás seguro/a?</h2>
              <button type="submit" class="popup__submit">Sí</button>
            </form>
          </div>
        </div>
      </div>
      <div class="popup popup-avatar popup_hidden">
        <div class="popup__container">
          <div class="popup-avatar__base">
            <button type="button" class="popup__close-button popup__cerrar">
              ✖
            </button>
            <form name="avatar" class="popup__form popup-avatar__form">
              <h2 class="popup__title">Cambiar avatar</h2>
              <input
                type="url"
                name="avatar"
                placeholder="Enlace a la imagen"
                required
                class="popup-form__input"
              />
              <span class="popup-form__input-error"></span>
              <button type="submit" class="popup__submit">Guardar</button>
            </form>
          </div>
        </div>
      </div>
      <div class="popup-editor-profile popup_hidden">
        <div class="popup-editor-profile__overlay"></div>
        <div class="popup-editor-profile__base">
          <h3 class="popup-editor-profile__title">Editar Perfil</h3>
          <form action="#" class="popup-editor-profile__form" id="form">
            <label class="popup-form__field">
              <input
                type="text"
                class="popup-editor-profile__input"
                placeholder="name"
                name="name"
                minlength="3"
                maxlength="40"
                id="name"
                autocomplete="name"
                required
              />
              <span class="popup-form__input-error name-error"></span>
            </label>
            <label class="popup-form__field">
              <input
                type="text"
                class="popup-editor-profile__input"
                placeholder="Degree"
                minlength="3"
                maxlength="40"
                id="degree"
                name="degree"
                autocomplete="organization-title"
                required
              />
              <span class="popup-form__input-error degree-error"></span>
            </label>

            <button class="popup-editor-profile__save-button" type="submit">
              Guardar
            </button>
          </form>
          <button class="popup-editor-profile__close-button">✖</button>
        </div>
      </div>
      <div class="popup-add-card popup_hidden">
        <div class="popup-add-card__overlay"></div>
        <div class="popup-add-card__base">
          <h3 class="popup-add-card__title">Nuevo Lugar</h3>
          <form action="#" class="popup-add-card__form" id="form">
            <label class="popup-form__field">
              <input
                type="text"
                class="popup-add-card__input"
                placeholder="Titulo"
                minlength="2"
                maxlength="30"
                id="titulo"
                name="titulo"
                required
              />
              <span class="popup-form__input-error titulo-error"></span>
            </label>
            <label class="popup-form__field">
              <input
                type="url"
                class="popup-add-card__input"
                placeholder="Enlace a la imagen"
                minlength="2"
                id="enlace"
                name="enlace"
                required
              />
              <span class="popup-form__input-error enlace-error"></span>
            </label>

            <button class="popup-add-card__save-button" type="submit">
              Guardar
            </button>
          </form>
          <button class="popup-add-card__close-button">✖</button>
        </div>
      </div>
      <header class="header">
        <img
          src="./images/Vector.png"
          alt="logo tripleten Around"
          class="header__logo"
        />
      </header>
      <main class="content">
        <section class="profile">
          <button
            class="profile__avatar-button"
            type="button"
            aria-label="Editar avatar"
          >
            <img src="" alt="Avatar de Cousteau" class="profile__avatar" />
            <span class="profile__avatar-overlay"></span>
          </button>

          <div class="profile__id">
            <div class="profile__id-textos">
              <p class="profile__name"></p>
              <p class="profile__degree"></p>
            </div>

            <button class="profile__button profile-button-edit">
              <img src="./images/editar.png" alt="button edit" />
            </button>
          </div>
          <button class="profile__button profile-button-add">
            <img src="./images/add-image.png" alt="button add" />
          </button>
        </section>

        <section class="gallery"></section>
        <template id="plantilla">
          <div class="card">
            <button class="card__delete" aria-label="borra card">🗑️</button>
            <img src="" alt="" class="card__image" />
            <div class="card__footer">
              <span class="card__title block"></span>
              <button class="card__favorite" aria-label="Guardar favorito">
                ♥
              </button>
            </div>
          </div>
        </template>
      </main>
      <footer class="footer">
        <span class="footer__copy">&copy; 2025 Fabricio Galindo Copado</span>
      </footer>
    </div>
    <script type="module" src="./page/index.js"></script>
  </body>
</html>
